kind = "web"
previewPath = "/"
title = "Leila's Nutritional Hub"
version = "1.0.0"
id = "artifacts/leilas-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19472

[services.development]
run = "pnpm --filter @workspace/leilas-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leilas-hub", "run", "build" ]
publicDir = "artifacts/leilas-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19472"
BASE_PATH = "/"
